name: Update Gradle verification metadata

on:
  pull_request_target:
    branches: [ main ]
    paths:
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/gradle-wrapper.properties'

jobs:
  update-verification-metadata:
    name: Regenerate verification metadata
    if: github.triggering_actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      # Checkout the base branch (trusted code) to avoid executing untrusted build scripts.
      # Only the version files (libs.versions.toml, gradle-wrapper.properties) are then
      # fetched from the PR branch — these have safe, predictable content from dependabot.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.base_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Apply dependabot version changes
        env:
          HEAD_REF: ${{ github.head_ref }}
        run: |
          git fetch origin "$HEAD_REF"
          git checkout FETCH_HEAD -- gradle/libs.versions.toml gradle/wrapper/gradle-wrapper.properties

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0

      - name: Regenerate verification metadata
        run: ./gradlew --write-verification-metadata sha256 --no-configuration-cache check

      - name: Commit updated verification metadata
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ github.repository_owner }}
          REPO: ${{ github.event.repository.name }}
          BRANCH: ${{ github.head_ref }}
        run: |
          if git diff --quiet gradle/verification-metadata.xml; then
            echo "No changes to commit."
            exit 0
          fi
          # Use the API to get the PR branch HEAD — git rev-parse HEAD would return
          # the base branch SHA since we checked out github.base_ref, not the PR branch.
          PARENT_SHA=$(gh api "repos/$OWNER/$REPO/git/refs/heads/$BRANCH" --jq '.object.sha')

          CURRENT_TREE=$(gh api "repos/$OWNER/$REPO/git/commits/$PARENT_SHA" --jq '.tree.sha')

          # Build the blob payload in a temp file to avoid "Argument list too long"
          # when verification-metadata.xml is large
          base64 -w 0 gradle/verification-metadata.xml > /tmp/content.b64
          python3 -c "import json; c=open('/tmp/content.b64').read(); print(json.dumps({'content':c,'encoding':'base64'}))" > /tmp/blob-payload.json

          BLOB_SHA=$(gh api "repos/$OWNER/$REPO/git/blobs" \
            --input /tmp/blob-payload.json \
            --jq '.sha')

          TREE_SHA=$(gh api "repos/$OWNER/$REPO/git/trees" \
            --input - <<EOF
          {"base_tree":"$CURRENT_TREE","tree":[{"path":"gradle/verification-metadata.xml","mode":"100644","type":"blob","sha":"$BLOB_SHA"}]}
          EOF
          )
          TREE_SHA=$(echo "$TREE_SHA" | jq -r '.sha')

          COMMIT_SHA=$(gh api "repos/$OWNER/$REPO/git/commits" \
            --field message="chore: update gradle verification metadata" \
            --field tree="$TREE_SHA" \
            --field "parents[]=$PARENT_SHA" \
            --jq '.sha')

          gh api "repos/$OWNER/$REPO/git/refs/heads/$BRANCH" \
            --method PATCH \
            --field sha="$COMMIT_SHA"


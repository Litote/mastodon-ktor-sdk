name: Update Gradle verification metadata

on:
  pull_request_target:
    branches: [ main ]
    paths:
      - 'gradle/libs.versions.toml'
      - 'gradle/wrapper/gradle-wrapper.properties'

jobs:
  update-verification-metadata:
    name: Regenerate verification metadata
    if: github.triggering_actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ steps.app-token.outputs.token }}

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2

      - name: Regenerate verification metadata
        run: ./gradlew --write-verification-metadata sha256 --no-configuration-cache dependencies check

      - name: Commit updated verification metadata
        env:
          GH_APP_SLUG: ${{ steps.app-token.outputs.app-slug }}
          GH_APP_USER_ID: ${{ steps.app-token.outputs.installation-id }}
        run: |
          git config user.name "${GH_APP_SLUG}[bot]"
          git config user.email "${GH_APP_USER_ID}+${GH_APP_SLUG}[bot]@users.noreply.github.com"
          git add gradle/verification-metadata.xml
          if ! git diff --staged --quiet; then
            git commit -m "chore: update gradle verification metadata"
            git push
          fi


name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  semantic-pr-title:
    if: github.event_name == 'pull_request'
    name: Validate PR title (Conventional Commits)
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    name: Check (JVM / JS / Linux)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: disabled
          build-scan-publish: false

      - name: Detect code changes
        id: detect-changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          else
            CHANGED=$(git diff --name-only HEAD~1..HEAD 2>/dev/null || echo "")
          fi
          if echo "$CHANGED" | grep -qE '\.(kt|kts|gradle|yml|yaml|toml)$'; then
            echo "has_code_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_code_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Override JVM args for CI
        run: sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx3g -Dfile.encoding=UTF-8/' gradle.properties

      - name: Warm up convention build
        run: ./gradlew :convention:assemble --no-configuration-cache

      - name: Build & test
        run: >
          ./gradlew check
          --max-workers=2
          -PappleTargets=false

      - name: Jacoco aggregated report
        if: steps.detect-changes.outputs.has_code_changes == 'true'
        run: ./gradlew jacocoAggregatedReport --no-configuration-cache

      - name: SonarCloud analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_BRANCH: ${{ github.head_ref }}
          PR_BASE: ${{ github.base_ref }}
          EVENT_NAME: ${{ github.event_name }}
        if: env.SONAR_TOKEN != '' && steps.detect-changes.outputs.has_code_changes == 'true'
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            ./gradlew sonar --no-configuration-cache \
              -Dsonar.pullrequest.key="$PR_NUMBER" \
              -Dsonar.pullrequest.branch="$PR_BRANCH" \
              -Dsonar.pullrequest.base="$PR_BASE"
          else
            ./gradlew sonar --no-configuration-cache
          fi

      - name: SonarCloud quality gate
        if: env.SONAR_TOKEN != '' && steps.detect-changes.outputs.has_code_changes == 'true'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonarCheck --no-configuration-cache


  check-macos:
    name: Check (macOS / Apple targets)
    runs-on: macos-latest
    needs: check
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: disabled
          build-scan-publish: false

      - name: Detect code changes
        id: detect-changes
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            CHANGED=$(git diff --name-only "origin/$BASE_REF...HEAD")
          else
            CHANGED=$(git diff --name-only HEAD~1..HEAD 2>/dev/null || echo "")
          fi
          if echo "$CHANGED" | grep -qE '\.(kt|kts|gradle|yml|yaml|toml)$'; then
            echo "has_code_changes=true" >> $GITHUB_OUTPUT
          else
            echo "has_code_changes=false" >> $GITHUB_OUTPUT
          fi

      - name: Warm up convention build
        if: steps.detect-changes.outputs.has_code_changes == 'true'
        run: ./gradlew :convention:assemble --no-configuration-cache

      - name: Build & test Apple targets
        if: steps.detect-changes.outputs.has_code_changes == 'true'
        run: >
          ./gradlew
          -Dorg.gradle.jvmargs="-Xmx10g -Dfile.encoding=UTF-8"
          macosArm64Test
          iosSimulatorArm64Test
          tvosSimulatorArm64Test
          watchosSimulatorArm64Test
          compileKotlinIosArm64
          compileKotlinIosX64
          compileKotlinTvosArm64
          compileKotlinWatchosArm64

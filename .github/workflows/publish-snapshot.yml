name: Publish SNAPSHOT

on:
  workflow_dispatch:
  schedule:
    - cron: '0 2 * * 1' # Every Monday at 02:00 UTC

concurrency:
  group: publish-snapshot
  cancel-in-progress: false

jobs:
  publish-snapshot:
    name: Publish SNAPSHOT (${{ matrix.group }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - group: a-b
            client_pattern: "^[ab]"
            include_other: false
          - group: c-f
            client_pattern: "^[c-f]"
            include_other: false
          - group: g-n
            client_pattern: "^[g-n]"
            include_other: false
          - group: o-s
            client_pattern: "^[o-s]"
            include_other: false
          - group: t-z
            client_pattern: "^[t-z]"
            include_other: true

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@39e147cb9de83bb9910b8ef8bd7fff0ee20fcd6f # v6.0.1
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: disabled
          build-scan-publish: false
          gradle-home-cache-cleanup: false

      - name: Warm up convention build
        run: ./gradlew :convention:assemble --no-configuration-cache

      - name: Override JVM args
        run: sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8/' gradle.properties

      - name: Publish SNAPSHOT to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: |
          TASKS=$(ls client/ | grep -vE "^(build|shared)" | grep -E "${{ matrix.client_pattern }}" | sed 's/^/:client:/' | sed 's/$/:publishToMavenCentral/' | tr '\n' ' ')
          if [ "${{ matrix.include_other }}" = "true" ]; then
            SHARED=$(ls client/ | grep "^shared" | sed 's/^/:client:/' | sed 's/$/:publishToMavenCentral/' | tr '\n' ' ')
            TASKS="$TASKS $SHARED :sdk:configuration:publishToMavenCentral :sdk:send:publishToMavenCentral"
          fi
          ./gradlew $TASKS --max-workers=8

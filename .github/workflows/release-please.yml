name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release manually (e.g. v0.3.0)'
        required: true
        type: string

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@16a9c90856f42705d54a6fda1823352bdc62cf38 # v4
        id: release-please
        if: github.event_name == 'push'
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          last-release-sha: cbb0207fccf56da8e889e72ed51a55bb81bfcf0e

  publish:
    name: Publish ${{ needs.release-please.outputs.tag_name || inputs.tag }} (JVM / JS / Linux)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: disabled
          build-scan-publish: false

      - name: Extract release version
        env:
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${VERSION}/" gradle.properties
          sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8/' gradle.properties

      - name: Warm up convention build
        run: ./gradlew :convention:assemble --no-configuration-cache

      - name: Build & test
        run: ./gradlew check

      - name: Jacoco aggregated report
        run: ./gradlew jacocoAggregatedReport

      - name: SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar

      - name: SonarCloud quality gate
        if: env.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonarCheck

      # Publishes JVM, JS, WASM, Linux, Windows, and KotlinMultiplatform metadata.
      # Apple targets are excluded here and handled by the publish-macos job.
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: >
          ./gradlew publishAndReleaseToMavenCentral
          --max-workers=8
          -x publishMacosArm64PublicationToMavenCentralRepository
          -x publishIosArm64PublicationToMavenCentralRepository
          -x publishIosX64PublicationToMavenCentralRepository
          -x publishIosSimulatorArm64PublicationToMavenCentralRepository
          -x publishTvosArm64PublicationToMavenCentralRepository
          -x publishTvosSimulatorArm64PublicationToMavenCentralRepository
          -x publishWatchosArm64PublicationToMavenCentralRepository
          -x publishWatchosSimulatorArm64PublicationToMavenCentralRepository

      - name: Publish to Gradle Plugin Portal
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins

  publish-macos:
    name: Publish ${{ needs.release-please.outputs.tag_name || inputs.tag }} (Apple targets)
    runs-on: macos-latest
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5.0.2
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: disabled
          build-scan-publish: false

      - name: Extract release version
        env:
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          sed -i "" "s/^VERSION_NAME=.*/VERSION_NAME=${VERSION}/" gradle.properties
          sed -i "" 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8/' gradle.properties

      - name: Warm up convention build
        run: ./gradlew :convention:assemble --no-configuration-cache

      # Publishes only Apple targets (macOS, iOS, tvOS, watchOS).
      # JVM / JS / WASM / Linux / Windows / KotlinMultiplatform metadata are handled by the publish job.
      - name: Publish Apple targets to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: >
          ./gradlew publishAndReleaseToMavenCentral
          --max-workers=8
          -x publishJvmPublicationToMavenCentralRepository
          -x publishJsPublicationToMavenCentralRepository
          -x publishWasmJsPublicationToMavenCentralRepository
          -x publishLinuxX64PublicationToMavenCentralRepository
          -x publishLinuxArm64PublicationToMavenCentralRepository
          -x publishMingwX64PublicationToMavenCentralRepository
          -x publishKotlinMultiplatformPublicationToMavenCentralRepository

name: Release Please

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release manually (e.g. v0.3.0)'
        required: true
        type: string

concurrency:
  group: release-please
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      release_created: ${{ steps.release-please.outputs.release_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
    steps:
      - uses: actions/create-github-app-token@1b10c78c7865c340bc4f6099eb2f838309f1e8c3 # v3
        id: app-token
        with:
          app-id: ${{ secrets.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_APP_PRIVATE_KEY }}

      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release-please
        if: github.event_name == 'push'
        with:
          token: ${{ steps.app-token.outputs.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  publish:
    name: Publish ${{ needs.release-please.outputs.tag_name || inputs.tag }} (JVM / JS / Linux)
    runs-on: ubuntu-latest
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: disabled
          build-scan-publish: false
          gradle-home-cache-cleanup: false

      - name: Extract release version
        env:
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${VERSION}/" gradle.properties
          sed -i 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8/' gradle.properties

      - name: Warm up convention build
        run: ./gradlew :convention:assemble --no-configuration-cache

      - name: Build & test
        run: ./gradlew check

      - name: Jacoco aggregated report
        run: ./gradlew jacocoAggregatedReport --no-configuration-cache

      - name: SonarCloud analysis
        if: env.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonar --no-configuration-cache

      - name: SonarCloud quality gate
        if: env.SONAR_TOKEN != ''
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: ./gradlew sonarCheck --no-configuration-cache

      # Publishes JVM, JS, WASM, Linux, Windows, and KotlinMultiplatform metadata.
      # Apple targets are excluded here and handled by the publish-macos job.
      - name: Publish to Maven Central
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
        run: >
          ./gradlew publishAndReleaseToMavenCentral
          --max-workers=8
          -x publishMacosArm64PublicationToMavenCentralRepository
          -x publishIosArm64PublicationToMavenCentralRepository
          -x publishIosX64PublicationToMavenCentralRepository
          -x publishIosSimulatorArm64PublicationToMavenCentralRepository
          -x publishTvosArm64PublicationToMavenCentralRepository
          -x publishTvosSimulatorArm64PublicationToMavenCentralRepository
          -x publishWatchosArm64PublicationToMavenCentralRepository
          -x publishWatchosSimulatorArm64PublicationToMavenCentralRepository

      - name: Publish to Gradle Plugin Portal
        env:
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          GRADLE_PUBLISH_KEY: ${{ secrets.GRADLE_PUBLISH_KEY }}
          GRADLE_PUBLISH_SECRET: ${{ secrets.GRADLE_PUBLISH_SECRET }}
        run: ./gradlew publishPlugins

      - name: Build CLI & MCP Server fat JARs and native binaries (Linux / Windows)
        run: >
          ./gradlew
          :cli:shadowJar
          :cli:linkReleaseExecutableLinuxX64
          :cli:linkReleaseExecutableLinuxArm64
          :cli:linkReleaseExecutableMingwX64
          :mcp-server:shadowJar
          :mcp-server:linkReleaseExecutableLinuxX64
          :mcp-server:linkReleaseExecutableLinuxArm64
          :mcp-server:linkReleaseExecutableMingwX64

      - name: Upload CLI artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          cp cli/build/bin/linuxX64/releaseExecutable/mastodon-cli.kexe mastodon-cli-linux-x64
          cp cli/build/bin/linuxArm64/releaseExecutable/mastodon-cli.kexe mastodon-cli-linux-arm64
          cp cli/build/bin/mingwX64/releaseExecutable/mastodon-cli.exe mastodon-cli-windows-x64.exe
          gh release upload "$TAG" \
            cli/build/libs/mastodon-cli-*.jar \
            mastodon-cli-linux-x64 \
            mastodon-cli-linux-arm64 \
            mastodon-cli-windows-x64.exe \
            --clobber

      - name: Upload MCP Server artifacts to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          cp mcp-server/build/bin/linuxX64/releaseExecutable/mcp-server.kexe mastodon-mcp-server-linux-x64
          cp mcp-server/build/bin/linuxArm64/releaseExecutable/mcp-server.kexe mastodon-mcp-server-linux-arm64
          cp mcp-server/build/bin/mingwX64/releaseExecutable/mcp-server.exe mastodon-mcp-server-windows-x64.exe
          gh release upload "$TAG" \
            mcp-server/build/libs/mastodon-mcp-server-*.jar \
            mastodon-mcp-server-linux-x64 \
            mastodon-mcp-server-linux-arm64 \
            mastodon-mcp-server-windows-x64.exe \
            --clobber

  publish-macos:
    name: Publish ${{ needs.release-please.outputs.tag_name || inputs.tag }} (Apple chunk ${{ matrix.chunk }})
    runs-on: macos-latest
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    strategy:
      fail-fast: false
      matrix:
        chunk: [0, 1, 2, 3]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: disabled
          build-scan-publish: false
          gradle-home-cache-cleanup: false

      - name: Extract release version
        env:
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          sed -i "" "s/^VERSION_NAME=.*/VERSION_NAME=${VERSION}/" gradle.properties
          sed -i "" 's/^org.gradle.jvmargs=.*/org.gradle.jvmargs=-Xmx6g -Dfile.encoding=UTF-8/' gradle.properties

      - name: Warm up convention build
        run: ./gradlew :convention:assemble --no-configuration-cache

      # Publishes only Apple targets (macOS, iOS, tvOS, watchOS) for this chunk of client modules.
      # 226 client modules are split into 4 parallel jobs (~56 modules each, round-robin by index).
      # SDK modules (configuration, send) are handled by chunk 0.
      # JVM / JS / WASM / Linux / Windows / KotlinMultiplatform metadata are handled by the publish job.
      - name: Publish Apple targets to Maven Central (chunk ${{ matrix.chunk }})
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
          CHUNK: ${{ matrix.chunk }}
        run: |
          MODULES=($(ls client/ | sort))
          TOTAL=${#MODULES[@]}
          CHUNK_COUNT=4

          TASKS=""
          for ((i=CHUNK; i<TOTAL; i+=CHUNK_COUNT)); do
            TASKS="$TASKS :client:${MODULES[$i]}:publishAndReleaseToMavenCentral"
          done

          if [ "$CHUNK" -eq 0 ]; then
            TASKS="$TASKS :sdk:configuration:publishAndReleaseToMavenCentral :sdk:send:publishAndReleaseToMavenCentral"
          fi

          ./gradlew $TASKS \
            --no-configuration-cache \
            --max-workers=4 \
            -x publishJvmPublicationToMavenCentralRepository \
            -x publishJsPublicationToMavenCentralRepository \
            -x publishWasmJsPublicationToMavenCentralRepository \
            -x publishLinuxX64PublicationToMavenCentralRepository \
            -x publishLinuxArm64PublicationToMavenCentralRepository \
            -x publishMingwX64PublicationToMavenCentralRepository \
            -x publishKotlinMultiplatformPublicationToMavenCentralRepository

      - name: Build CLI & MCP Server native binaries (macOS ARM64)
        if: matrix.chunk == 0
        run: ./gradlew :cli:linkReleaseExecutableMacosArm64 :mcp-server:linkReleaseExecutableMacosArm64

      - name: Upload CLI & MCP Server macOS binaries to GitHub Release
        if: matrix.chunk == 0
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          cp cli/build/bin/macosArm64/releaseExecutable/mastodon-cli.kexe mastodon-cli-macos-arm64
          cp mcp-server/build/bin/macosArm64/releaseExecutable/mcp-server.kexe mastodon-mcp-server-macos-arm64
          gh release upload "$TAG" mastodon-cli-macos-arm64 mastodon-mcp-server-macos-arm64 --clobber

  docs:
    name: Publish KDoc to GitHub Pages
    runs-on: ubuntu-latest
    needs: [release-please, publish]
    if: needs.release-please.outputs.release_created == 'true' || github.event_name == 'workflow_dispatch'
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          ref: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
        with:
          cache-encryption-key: ${{ secrets.GRADLE_ENCRYPTION_KEY }}
          dependency-graph: disabled
          build-scan-publish: false
          gradle-home-cache-cleanup: false

      - name: Extract release version
        env:
          TAG: ${{ needs.release-please.outputs.tag_name || inputs.tag }}
        run: |
          VERSION="${TAG#v}"
          sed -i "s/^VERSION_NAME=.*/VERSION_NAME=${VERSION}/" gradle.properties

      - name: Warm up convention build
        run: ./gradlew :convention:assemble --no-configuration-cache

      - name: Generate KDoc
        run: ./gradlew dokkaGeneratePublicationHtml --no-configuration-cache


      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: build/dokka/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
